  <script>
    const plot = document.getElementById('year-plot');
    const citeToggle = document.getElementById('high-cite-toggle');
    const visibleCount = document.getElementById('visible-count');

    const allCount = 624;
    const highCiteCount = 99;

    function updateVisibleCount() {
      const onlyHigh = citeToggle.checked;
      const n = onlyHigh ? highCiteCount : allCount;
      const label = onlyHigh ? '>100 citations only' : 'All papers';
      visibleCount.textContent = `Showing ${n} points (${label})`;
    }

    function applyCitationFilter() {
      const onlyHigh = citeToggle.checked;
      if (onlyHigh) {
        Plotly.restyle(plot, { visible: [false, true] });
      } else {
        Plotly.restyle(plot, { visible: [true, false] });
      }
      updateVisibleCount();
    }

    citeToggle.addEventListener('change', applyCitationFilter);
    updateVisibleCount();
  </script>
